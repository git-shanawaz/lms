{% extends 'base.html' %}

{% block content %}
<h2>Request Books</h2>

<form method="post" action="{{ url_for('submit_request') }}">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Roll No</label>
    <input name="roll_no" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Class</label>
    <input name="student_class" class="form-control">
  </div>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input name="email" type="email" class="form-control">
  </div>

  <h5>Books Selected</h5>
  {% for book_id in book_ids %}
    <input type="hidden" name="book_ids" value="{{ book_id }}">
  {% endfor %}

  <button class="btn btn-warning">Submit Request</button>
</form>
{% endblock %}
