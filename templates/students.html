{% extends 'base.html' %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Students</h2>
    <a href="{{ url_for('add_student') }}" class="btn btn-warning">Add Student</a>
  </div>
  <form method="get" class="mb-3">
    <div class="input-group">
      <input name="q" value="{{ q }}" class="form-control" placeholder="Search by name or roll">
      <button class="btn btn-outline-warning">Search</button>
    </div>
  </form>
  <table class="table">
    <thead><tr><th>Name</th><th>Roll No</th><th>Email</th><th>Actions</th></tr></thead>
    <tbody>
      {% for s in students %}
      <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.roll_no }}</td>
        <td>{{ s.email or '' }}</td>
        <td>
          <form action="{{ url_for('delete_student', student_id=s.id) }}" method="post" style="display:inline-block" onsubmit="return confirm('Delete this student?');">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
